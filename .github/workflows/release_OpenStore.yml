# this file will build the app, create a downloadable artifact, publish the app to OpenStore and create a release with the build app as asset
name: build, publish and release
on:
  # start the script when a tag of this format v1.2.3(.4) is pushed
  # do not execute when the tag contains "RC"
  # note: GitHub Actions does not support full regex in tag patterns; it uses simple glob patterns like *, ?, and [] instead.
  # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#filter-pattern-cheat-sheet
  push:
    tags:
      - 'v*.*.**'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

# define the build job
jobs:
  build:
    if: "!contains(github.ref, 'RC')"
    strategy:
      matrix:
        appname: [cinny.danfro]
        arch: [armhf, arm64, amd64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # here @latest doesn't work, specific version v4 or above
        with:
          submodules: 'true'

      - name: Ensure global gitconfig and mark safe directories (pre-container)
        run: |
          # make sure HOME exists and a global gitconfig file is present
          # Add the paths that clickable/action will mount into the container as safe paths
          mkdir -p "$HOME"
          touch "$HOME/.gitconfig"
          git config --global --add safe.directory /tmp/clickable_base/cinny-ut || true
          git config --global --add safe.directory /github/workspace || true
          git config --global --add safe.directory '*' || true

      - name: Extract NVM version from prebuild.sh
        id: extract-nvm-version
        run: echo "NVM_VERSION=$(grep -oP '(?<=NVM_VERSION=)[^ ]+' prebuild.sh)" >> $GITHUB_ENV

      - name: Extract node version from prebuild.sh
        id: extract-node-version
        run: echo "NODE_VERSION=$(grep -oP '(?<=NODE_VERSION=)[^ ]+' prebuild.sh)" >> $GITHUB_ENV

      - name: Set up Node.js environment
        run: |
          export NVM_DIR="$HOME/.nvm"
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v$NVM_VERSION/install.sh | bash
          . "$NVM_DIR/nvm.sh"  # Source nvm
          nvm install $NODE_VERSION
          nvm use $NODE_VERSION
          echo "Node.js $(node -v) installed via nvm"

      - name: Setup Podman for Clickable
        run: |
          # Run Podman in rootful mode to avoid user namespace issues
          # This requires using sudo with podman commands
          sudo podman system info || true
          
          # Create a wrapper script that redirects podman calls to sudo podman
          sudo tee /usr/local/bin/podman-wrapper > /dev/null <<'EOF'
          #!/bin/bash
          exec sudo /usr/bin/podman "$@"
          EOF
          
          sudo chmod +x /usr/local/bin/podman-wrapper
          
          # Make the wrapper available as 'podman' by modifying PATH
          echo "/usr/local/bin" >> $GITHUB_PATH
          
          # Create a symlink (alternative approach)
          sudo ln -sf /usr/local/bin/podman-wrapper /usr/local/bin/podman

      - name: Install clickable
        run: |
          python3 -m pip install clickable-ut

      - name: Build
        # build the app with clickable for all specified architectures
        # then publish to OpenStore using the API key specified as Github secret with the last commit message as changelog
        env:
          OPENSTORE_API_KEY: ${{ secrets.OPENSTORE_API_KEY }}
        run: |
          # grab the last commit message as changelog and publish
          # do not add spaces infront and after a =
          # add changelog as last parameter
          # wrap changelog assignment in "" to cover multiline text
          clickable build --arch ${{ matrix.arch }}
          CHANGELOG="${{ github.event.head_commit.message }}"
          clickable publish --arch arm64 -- "$CHANGELOG"
          clickable publish --arch amd64
          clickable publish --arch armhf

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v2 # https://github.com/softprops/action-gh-release
        with:
          files: build/*/app/*.click
          body: ${{ github.event.head_commit.message }} # Grab the last commit message as changelog
          prerelease: false